name: Enterprise IT Operations Automation Platform CI

on:
    push:
        branches:
            - master
            - feature/**
    pull_request:
        branches:
            - master
            - feature/**

concurrency: 
  group: ci-${{ github.workflow }}-${{github.ref}}
  cancel-in-progress: true

jobs:
    backend:
        permissions:
            contents: read
        timeout-minutes: 20
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:17-alpine
                env:
                    POSTGRES_USER: ${{vars.PS_USER}}
                    POSTGRES_PASSWORD: ${{vars.PS_PWD}}
                    POSTGRES_DB: ${{vars.DB_NAME}}
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        env:
            APP_NAME: ${{ vars.APP_NAME }}
            APP_VERSION: ${{ vars.APP_VERSION }}
            ENVIRONMENT: ci
            DEBUG: ${{ vars.DEBUG }}
            HOST: ${{ vars.HOST }}
            PORT: ${{ vars.PORT }}
            OTP_LENGTH: ${{ vars.OTP_LENGTH }}
            OTP_EXPIRY_MINUTES: ${{ vars.OTP_EXPIRY_MINUTES }}
            OTP_MAX_ATTEMPTS: ${{ vars.OTP_MAX_ATTEMPTS }}
            DATABASE_URL: postgresql://${{vars.PS_USER}}:${{vars.PS_PWD}}@localhost:5432/${{vars.DB_NAME}}

        
        name: Backend Build
    
        defaults:
            run:
                working-directory: backend

        steps:
            - name: Checkout_code
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: pip
                  cache-dependency-path: backend/requirements-test.txt
                  
            - name: Install dependencies
              run: |
                python -m pip install pip==26.1.2
                pip install --only-binary :all: --require-hashes -r requirements-test.txt
                
            
            - name: Run Ruff
              run: |
                    ruff check .    
      
            - name: Check Formattting
              run: |
                    black --check .
           
            - name: Check Import Order (isort)
              run: |
                    isort --check .

            - name: Run Bandit Security scan
              run: |
                    bandit -r app
               
            - name: Run Backend tests (pytest) 
              run: |
                    pytest         

            - name: Validate FastAPI app
              run: |
                python -c "from app.main import app"

    frontend:
        permissions:
            contents: read
        name: Frontend Build
        timeout-minutes: 20
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend
            
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22" 
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json
             
            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Audit frontend dependencies
              run: npm audit

            - name: Build react app
              run: npm run build

    Sonarcloud:
        permissions:
            contents: read
        name: Sonarqube analysis
        runs-on: ubuntu-latest
            
        needs:
            - backend
            - frontend

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Sonarqube cloud scan
              uses: Sonarsource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703
              env:
                  SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
    

    docker:
        permissions:
            contents: read
        name: Docker build
        runs-on: ubuntu-latest
        needs:
            - backend
            - frontend
            - Sonarcloud
        
        steps:
        
          # steps for checkout
            - name: Checkout repository
              uses: actions/checkout@v4


          #setting up docker buildx ( latest engine )
            - name: Setup up Docker buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f


          #Docker metadata setup
            - name: Docker metadata (Back-end)
              id: backend-meta
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
              with:
                images: entreprise-backend
                tags: |
                  type=raw,value=latest
                  type=ref,event=branch
                  type=sha


            #building back-end image
            - name: Build back-end image
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
              with: 
                context: ./backend
                push: false
                load: true
                tags: ${{ steps.backend-meta.outputs.tags }}
                labels: ${{ steps.backend-meta.outputs.labels}}
                cache-from: type=gha
                cache-to: type=gha,mode=max

            - name: Docker metadata (Front-end)
              id: frontend-meta
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
              with:
                images: entreprise-frontend
                tags: |
                  type=raw,value=latest
                  type=ref,event=branch
                  type=sha
            
            
            
            #building front-end image
            - name: Build front-end image
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
              with: 
                context: ./frontend
                push: false
                load: true
                tags: ${{steps.frontend-meta.outputs.tags}}
                labels: ${{steps.frontend-meta.outputs.labels}}
                cache-from: type=gha
                cache-to: type=gha,mode=max


            - name: Save backend image
              run: |
               docker save \
                -o backend-image.tar \
                entreprise-backend:${{ github.sha }}
              

            - name: Save frontend image
              run: |
               docker save \
               -o frontend-image.tar \
               entreprise-frontend:${{ github.sha }}  

            - name: Upload back-end image
              uses: actions/upload-artifact@v4
              with: 
                name: backend-image
                path: backend-image.tar
                retention-days: 7

            - name: upload front-end image
              uses: actions/upload-artifact@v4
              with:
                name: frontend-image
                path: frontend-image.tar
                retention-days: 7

    trivy:
        permissions:
            contents: read
            security-events: write
            id-token: write
        name: Trivy security scan
        needs: docker
        runs-on: ubuntu-latest

        steps:
            #download and cache trivy database  
            - name: Cache Trivy Database
              uses: actions/cache@v4
              with:
                path: ~/.cache/trivy
                key: trivy-db-${{runner.os}}
                restore-keys: |
                  trivy-db-

            #download .tar artifacts 
            - name: Download back-end image
              uses: actions/download-artifact@v4 
              with: 
                name: backend-image
            
            - name: Download front-end image
              uses: actions/download-artifact@v4
              with: 
                name: frontend-image

            #Load docker images for trivy
            - name: Load back-end image
              run: docker load -i backend-image.tar

            - name: Load front-end image
              run: docker load -i frontend-image.tar

            - name: verify images
              run: docker images

            #scan Backend image in trivy    
            - name: Scan backend image
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
              with:
                image-ref: entreprise-backend:latest
                format: sarif
                output: backend-trivy-results.sarif
                exit-code: 1
                ignore-unfixed: true
                vuln-type: os,library
                severity: HIGH,CRITICAL

            # Scan frontend image in trivy
            - name: Scan frontend image
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
              with:
                image-ref: entreprise-frontend:latest
                format: sarif
                output: frontend-trivy-results.sarif
                exit-code: 1
                ignore-unfixed: true
                vuln-type: os,library
                severity: HIGH,CRITICAL

            # Upload the backend sarif
            - name: Upload backend SARIF
              uses: github/codeql-action/upload-sarif@v3
              with:
                sarif_file: backend-trivy-results.sarif

            - name: Upload frontend SARIF
              uses: github/codeql-action/upload-sarif@v3
              with:
                sarif_file: frontend-trivy-results.sarif
                
            #Generate Backend SBOM
            - name: Generate Backend SBOM
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
              with:
                image-ref: entreprise-backend:latest
                format: cyclonedx
                output: backend-sbom.json
              
            #Generate Frontend SBOM     
            - name: Generate Frontend SBOM
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
              with: 
                image-ref: entreprise-frontend:latest
                format: cyclondex
                output: frontend-sbom.json

            #Upload Backend SBOM
            - name: Upload Backend SBOM
              uses: actions/upload-artifact@v4
              with: 
                name: backend-sbom
                path: backend-sbom.json
                retention-days: 30

            #Upload Frontend SBOM
            - name: Upload Frontend SBOM
              uses: actions/upload-artifact@v4
              with: 
                name: frontend-sbom
                path: frontend-sbom.json
                retention-days: 30

            - name: Install cosign
              uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac