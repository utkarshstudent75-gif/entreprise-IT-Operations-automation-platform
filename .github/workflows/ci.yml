name: Enterprise IT Operations Automation Platform CI

on:
    push:
        branches:
            - master
            - feature/**
    pull_request:
        branches:
            - master
            - feature/**

permissions:
  contents: read

concurrency: 
  group: ci-${{ github.workflow }}-${{github.ref}}
  cancel-in-progress: true

jobs:
    backend:
        timeout-minutes: 20
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:17-alpine
                env:
                    POSTGRES_USER: ${{vars.PS_USER}}
                    POSTGRES_PASSWORD: ${{vars.PS_PWD}}
                    POSTGRES_DB: ${{vars.DB_NAME}}
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        env:
            APP_NAME: ${{ vars.APP_NAME }}
            APP_VERSION: ${{ vars.APP_VERSION }}
            ENVIRONMENT: ci
            DEBUG: ${{ vars.DEBUG }}
            HOST: ${{ vars.HOST }}
            PORT: ${{ vars.PORT }}
            OTP_LENGTH: ${{ vars.OTP_LENGTH }}
            OTP_EXPIRY_MINUTES: ${{ vars.OTP_EXPIRY_MINUTES }}
            OTP_MAX_ATTEMPTS: ${{ vars.OTP_MAX_ATTEMPTS }}
            DATABASE_URL: postgresql://${{vars.PS_USER}}:${{vars.PS_PWD}}@localhost:5432/${{vars.DB_NAME}}

        
        name: Backend Build
    
        defaults:
            run:
             working-directory: backend

        steps:
            - name: Checkout_code
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: pip
                  cache-dependency-path: backend/requirements-test.txt
                  
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements-test.txt
                
            
            - name: Run Ruff
              run: |
                    ruff check .    
      
            - name: Check Formattting
              run: |
                    black --check .
           
            - name: Check Import Order (isort)
              run: |
                    isort --check .

            - name: Run Bandit Security scan
              run: |
                    bandit -r app
               
            - name: Run Backend tests (pytest) 
              run: |
                    pytest         

            - name: Validate FastAPI app
              run: |
                python -c "from app.main import app"

    frontend:
        
        name: Frontend Build
        timeout-minutes: 20
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend
            
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22" 
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json
             
            - name: Install dependencies
              run: npm ci

            - name: Audit frontend dependencies
              run: npm audit

            - name: Build react app
              run: npm run build

            
    docker:
       name: Docker build
       runs-on: ubuntu-latest
       
       needs:
          - backend
          - frontend

       steps:
         - name: Checkout repository
           uses: actions/checkout@4

         - name: Build back-end image
           run:  |
              docker build \
              -t entreprise-backend:latest \
              ./backend

         - name: Build front-end image
           run: |
              docker build \
              -t entreprise-frontend:latest \
              ./frontend
