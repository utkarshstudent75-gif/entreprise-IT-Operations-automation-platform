name: Enterprise IT Operations Automation Platform CI

on:
    push:
        branches:
            - master
            - feature/**
    pull_request:
        branches:
            - master
            - feature/**
            
jobs:
    backend:
        
        runs-on: ubuntu-latest
        env:
            APP_NAME: ${{ vars.APP_NAME }}
            APP_VERSION: ${{ vars.APP_VERSION }}
            ENVIRONMENT: ci
            DEBUG: ${{ vars.DEBUG }}
            HOST: ${{ vars.HOST }}
            PORT: ${{ vars.PORT }}
            OTP_LENGTH: ${{ vars.OTP_LENGTH }}
            OTP_EXPIRY_MINUTES: ${{ vars.OTP_EXPIRY_MINUTES }}
            OTP_MAX_ATTEMPTS: ${{ vars.OTP_MAX_ATTEMPTS }}

        
        name: Backend Build

        
        defaults:
            run:
             working-directory: backend

        steps:
            - name: Checkout_code
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
                
            
            - name: Run Ruff
              run: |
                    ruff check .    
                
                
            - name: Run Pytest  
              run: |
                    pytest    



            - name: Validate FastAPI app
              run: |
                python -c "from app.main import app"

    frontend:
        
        name: Frontend Build

        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend
            
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22" 
             
            - name: Install dependencies
              run: npm ci

            - name: Build react app
              run: npm run build
